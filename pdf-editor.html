<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Editor Local</title>
<script src="./pdf-lib.min.js"></script>
<script src="./pdf.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #1a1a2e; color: #e0e0e0;
  height: 100vh; display: flex; flex-direction: column; overflow: hidden;
}

/* Header */
header {
  background: #16213e; border-bottom: 1px solid #0f3460;
  padding: 10px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0;
}
.logo { font-size: 18px; font-weight: 700; color: #e94560; }
.logo span { color: #e0e0e0; font-weight: 400; }
header .spacer { flex: 1; }
.header-info { font-size: 12px; color: #555; }

/* Buttons */
.btn {
  padding: 6px 14px; border-radius: 6px; border: none;
  cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s;
}
.btn-primary { background: #e94560; color: white; }
.btn-primary:hover:not(:disabled) { background: #c73652; }
.btn-secondary { background: #0f3460; color: #e0e0e0; border: 1px solid #1a4a80; }
.btn-secondary:hover:not(:disabled) { background: #1a4a80; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn.hidden { display: none; }

/* Main Layout */
.main { display: flex; flex: 1; overflow: hidden; }

/* File Panel */
.file-panel {
  width: 190px; flex-shrink: 0; background: #16213e;
  border-right: 1px solid #0f3460; display: flex; flex-direction: column; overflow: hidden;
}
.file-panel-header {
  padding: 10px 12px; font-size: 11px; font-weight: 600;
  color: #666; text-transform: uppercase; letter-spacing: 1px;
  border-bottom: 1px solid #0f3460; flex-shrink: 0;
}
.file-list { flex: 1; overflow-y: auto; padding: 4px; }
.file-item {
  padding: 8px 10px; border-radius: 6px; font-size: 12px;
  display: flex; align-items: center; gap: 6px; margin-bottom: 2px;
  color: #bbb; user-select: none;
}
.file-item-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
.file-item-pages {
  flex-shrink: 0; background: #0f3460; color: #888;
  border-radius: 8px; padding: 1px 6px; font-size: 10px;
}

/* Right Panel */
.right-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* Toolbar */
.toolbar {
  background: #16213e; border-bottom: 1px solid #0f3460;
  padding: 8px 12px; display: flex; gap: 6px; flex-wrap: wrap;
  align-items: center; flex-shrink: 0;
}
.toolbar .btn { padding: 5px 12px; font-size: 12px; }
.toolbar-sep { width: 1px; height: 22px; background: #0f3460; margin: 0 2px; }
.toolbar-spacer { flex: 1; }
.selection-info { font-size: 11px; color: #666; }

/* Page Area */
.page-area { flex: 1; overflow-y: auto; padding: 16px; position: relative; }
.page-area.drag-over { background: rgba(233,69,96,0.04); outline: 2px dashed #e94560; outline-offset: -8px; border-radius: 8px; }

/* Empty State */
.empty-state { text-align: center; padding: 80px 20px; pointer-events: none; }
.empty-state h3 { font-size: 20px; color: #444; margin-bottom: 10px; }
.empty-state p { font-size: 13px; color: #444; line-height: 1.8; }
.empty-icon { font-size: 48px; margin-bottom: 16px; }

/* Thumbnail Grid */
.thumbnail-grid {
  display: flex; flex-wrap: wrap; gap: 12px;
  align-content: flex-start;
}

/* Thumbnail Item */
.thumbnail-item {
  position: relative; border: 2px solid transparent; border-radius: 8px;
  overflow: visible; cursor: pointer; background: #16213e;
  transition: border-color 0.1s; flex-shrink: 0; user-select: none;
}
.thumbnail-item:hover { border-color: #1a4a80; }
.thumbnail-item.selected { border-color: #e94560; }
.thumbnail-item.drag-over { border-color: #e94560; border-style: dashed; }
.thumbnail-item.dragging { opacity: 0.35; }
.thumb-inner { border-radius: 6px; overflow: hidden; background: #2a2a3e; display: flex; align-items: center; justify-content: center; }
.thumbnail-canvas { display: block; }
.thumb-placeholder { width: 110px; height: 155px; display: flex; align-items: center; justify-content: center; color: #444; font-size: 11px; }
.page-label {
  text-align: center; font-size: 11px; color: #666;
  padding: 4px 2px 2px; background: transparent;
}
.check-mark {
  position: absolute; top: -6px; right: -6px;
  width: 20px; height: 20px; border-radius: 50%;
  background: #e94560; color: white; font-size: 11px;
  display: none; align-items: center; justify-content: center;
  font-weight: bold; box-shadow: 0 1px 4px rgba(0,0,0,0.5);
  z-index: 2;
}
.thumbnail-item.selected .check-mark { display: flex; }

/* Modals */
.modal {
  position: fixed; inset: 0; z-index: 100;
  display: flex; align-items: center; justify-content: center;
}
.modal.hidden { display: none; }
.modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.75); }
.modal-box {
  position: relative; background: #16213e;
  border: 1px solid #0f3460; border-radius: 12px;
  padding: 24px; min-width: 340px; max-width: 92vw;
  max-height: 90vh; overflow-y: auto; z-index: 1;
  box-shadow: 0 8px 40px rgba(0,0,0,0.6);
}
.modal-title { font-size: 16px; font-weight: 600; margin-bottom: 18px; }
.modal-close-x {
  position: absolute; top: 14px; right: 14px;
  background: none; border: none; color: #666; font-size: 22px;
  cursor: pointer; line-height: 1; padding: 2px 6px; border-radius: 4px;
}
.modal-close-x:hover { color: #e0e0e0; background: #0f3460; }
.modal-actions { margin-top: 18px; display: flex; gap: 8px; justify-content: flex-end; }

/* Preview Modal */
.preview-box {
  background: #111; padding: 16px; max-width: 95vw; max-height: 95vh;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
}
#previewCanvas { max-width: 100%; max-height: calc(90vh - 80px); display: block; }
.preview-nav { display: flex; gap: 10px; align-items: center; }
.preview-nav span { font-size: 13px; color: #888; min-width: 80px; text-align: center; }

/* Form */
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 12px; color: #888; margin-bottom: 6px; }
.form-radio { display: flex; gap: 20px; }
.form-radio label { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 13px; }
.form-input {
  width: 100%; background: #0f3460; border: 1px solid #1a4a80;
  border-radius: 6px; color: #e0e0e0; padding: 8px 10px; font-size: 13px;
}
.form-input:focus { outline: none; border-color: #e94560; }
.form-select {
  width: 100%; background: #0f3460; border: 1px solid #1a4a80;
  border-radius: 6px; color: #e0e0e0; padding: 8px 10px; font-size: 13px;
}
.result-box {
  background: #0d1f3c; border-radius: 6px; padding: 10px 12px;
  font-size: 12px; color: #888; min-height: 38px;
  white-space: pre-wrap; line-height: 1.6; border: 1px solid #0f3460;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 3px; }

/* Toast */
.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: #333; color: #e0e0e0; padding: 10px 20px; border-radius: 8px;
  font-size: 13px; z-index: 200; opacity: 0; pointer-events: none;
  transition: opacity 0.2s; box-shadow: 0 4px 16px rgba(0,0,0,0.4);
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">PDF<span> Editor Local</span></div>
  <div class="spacer"></div>
  <span class="header-info" id="headerInfo"></span>
  <button class="btn btn-primary" id="openFileBtn">ファイルを開く</button>
  <input type="file" id="fileInput" accept=".pdf" multiple hidden>
</header>

<!-- Main -->
<div class="main">

  <!-- File Panel -->
  <div class="file-panel">
    <div class="file-panel-header">ファイル</div>
    <div class="file-list" id="fileList"></div>
  </div>

  <!-- Right Panel -->
  <div class="right-panel">

    <!-- Toolbar -->
    <div class="toolbar">
      <button class="btn btn-secondary" id="deleteBtn" title="選択ページを削除 (Delete)">削除</button>
      <button class="btn btn-secondary" id="rotateLeftBtn" title="左90°回転">↺ 左回転</button>
      <button class="btn btn-secondary" id="rotateRightBtn" title="右90°回転">↻ 右回転</button>
      <div class="toolbar-sep"></div>
      <button class="btn btn-secondary" id="splitBtn">分割</button>
      <button class="btn btn-secondary" id="mergeBtn" title="読み込み済みPDFを結合してダウンロード">結合</button>
      <button class="btn btn-secondary" id="compressBtn">圧縮</button>
      <div class="toolbar-spacer"></div>
      <span class="selection-info" id="selectionInfo"></span>
      <button class="btn btn-primary" id="downloadBtn">↓ ダウンロード</button>
    </div>

    <!-- Page Area -->
    <div class="page-area" id="pageArea">
      <div id="emptyState" class="empty-state">
        <div class="empty-icon">📄</div>
        <h3>PDFを読み込む</h3>
        <p>ここにPDFファイルをドラッグ＆ドロップ<br>または「ファイルを開く」をクリック</p>
      </div>
      <div class="thumbnail-grid" id="thumbnailGrid" style="display:none"></div>
    </div>

  </div>
</div>

<!-- Preview Modal -->
<div id="previewModal" class="modal hidden">
  <div class="modal-overlay"></div>
  <div class="modal-box preview-box">
    <button class="modal-close-x" data-close="previewModal">×</button>
    <div class="preview-nav">
      <button class="btn btn-secondary" id="prevPageBtn">◀</button>
      <span id="previewLabel">1 / 1</span>
      <button class="btn btn-secondary" id="nextPageBtn">▶</button>
    </div>
    <canvas id="previewCanvas"></canvas>
  </div>
</div>

<!-- Split Modal -->
<div id="splitModal" class="modal hidden">
  <div class="modal-overlay"></div>
  <div class="modal-box">
    <button class="modal-close-x" data-close="splitModal">×</button>
    <div class="modal-title">分割</div>
    <div class="form-group">
      <div class="form-label">分割方法</div>
      <div class="form-radio">
        <label><input type="radio" name="splitMode" value="range" checked> ページ範囲指定</label>
        <label><input type="radio" name="splitMode" value="each"> 1ページずつ個別</label>
      </div>
    </div>
    <div class="form-group" id="rangeGroup">
      <div class="form-label">範囲を入力（例: 1-3,4-6）</div>
      <input type="text" class="form-input" id="splitRangeInput" placeholder="1-3,4-6">
    </div>
    <div class="result-box" id="splitPreview">範囲を入力するとプレビューが表示されます</div>
    <div class="modal-actions">
      <button class="btn btn-secondary" data-close="splitModal">キャンセル</button>
      <button class="btn btn-primary" id="executeSplitBtn">分割してダウンロード</button>
    </div>
  </div>
</div>

<!-- Compress Modal -->
<div id="compressModal" class="modal hidden">
  <div class="modal-overlay"></div>
  <div class="modal-box">
    <button class="modal-close-x" data-close="compressModal">×</button>
    <div class="modal-title">圧縮</div>
    <div class="form-group">
      <div class="form-label" id="compressOrigSize">現在のサイズ: —</div>
    </div>
    <div class="form-group">
      <div class="form-label">圧縮レベル</div>
      <select class="form-select" id="compressLevel">
        <option value="low">低（品質重視）</option>
        <option value="medium" selected>中（バランス）</option>
        <option value="high">高（サイズ重視）</option>
      </select>
    </div>
    <div class="result-box" id="compressResult">「圧縮を実行」をクリックしてください</div>
    <div class="modal-actions">
      <button class="btn btn-secondary" data-close="compressModal">閉じる</button>
      <button class="btn btn-secondary hidden" id="downloadCompressedBtn">圧縮版をダウンロード</button>
      <button class="btn btn-primary" id="executeCompressBtn">圧縮を実行</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
'use strict';

// ─── Worker Setup ───────────────────────────────────────────────────────────
pdfjsLib.GlobalWorkerOptions.workerSrc = './pdf.worker.min.js';

// ─── State ──────────────────────────────────────────────────────────────────
let files   = [];   // { name: string, buffer: ArrayBuffer }
let pages   = [];   // { fileIdx: number, origPageIdx: number, rotation: number }
let selected = new Set();  // indices into pages[]
let pdfjsDocs = {};  // fileIdx -> pdfjsLib.PDFDocumentProxy (cache)

let previewIdx = 0;  // currently previewed page index in pages[]

// ─── DOM ────────────────────────────────────────────────────────────────────
const fileListEl      = document.getElementById('fileList');
const thumbnailGridEl = document.getElementById('thumbnailGrid');
const emptyStateEl    = document.getElementById('emptyState');
const pageAreaEl      = document.getElementById('pageArea');
const fileInputEl     = document.getElementById('fileInput');
const selectionInfoEl = document.getElementById('selectionInfo');
const headerInfoEl    = document.getElementById('headerInfo');

// ─── Toast ──────────────────────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg, duration = 2200) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), duration);
}

// ─── File Loading ────────────────────────────────────────────────────────────
async function handleFiles(fileList) {
  const pdfs = [...fileList].filter(f => f.name.toLowerCase().endsWith('.pdf'));
  if (!pdfs.length) { showToast('PDFファイルを選択してください'); return; }
  for (const f of pdfs) {
    const buf = await f.arrayBuffer();
    await addFile(f.name, buf);
  }
}

async function addFile(name, buffer) {
  const fileIdx = files.length;
  files.push({ name, buffer });

  try {
    const doc = await pdfjsLib.getDocument({ data: buffer.slice(0) }).promise;
    pdfjsDocs[fileIdx] = doc;
    const count = doc.numPages;

    for (let i = 0; i < count; i++) {
      pages.push({ fileIdx, origPageIdx: i, rotation: 0 });
    }

    updateFileList();
    renderAllThumbnails();
    updateHeader();
  } catch (err) {
    files.pop();
    showToast(`読み込み失敗: ${name}`);
    console.error(err);
  }
}

function updateHeader() {
  const total = pages.length;
  headerInfoEl.textContent = total ? `${files.length}ファイル / ${total}ページ` : '';
}

// ─── File List ───────────────────────────────────────────────────────────────
function updateFileList() {
  fileListEl.innerHTML = '';
  // Count pages per file
  const counts = {};
  pages.forEach(p => { counts[p.fileIdx] = (counts[p.fileIdx] || 0) + 1; });

  files.forEach((f, i) => {
    const div = document.createElement('div');
    div.className = 'file-item';
    div.title = f.name;
    div.innerHTML = `
      <span>📄</span>
      <span class="file-item-name">${f.name}</span>
      <span class="file-item-pages">${counts[i] || 0}p</span>
    `;
    fileListEl.appendChild(div);
  });
}

// ─── Thumbnail Grid ──────────────────────────────────────────────────────────
function renderAllThumbnails() {
  thumbnailGridEl.innerHTML = '';
  emptyStateEl.style.display = pages.length ? 'none' : '';
  thumbnailGridEl.style.display = pages.length ? 'flex' : 'none';

  pages.forEach((_, i) => {
    const item = makeThumbnailItem(i);
    thumbnailGridEl.appendChild(item);
    renderThumb(i).catch(() => {});
  });

  updateSelectionUI();
  updateHeader();
}

function makeThumbnailItem(idx) {
  const div = document.createElement('div');
  div.className = 'thumbnail-item';
  div.dataset.idx = idx;
  div.draggable = true;

  const inner = document.createElement('div');
  inner.className = 'thumb-inner';

  const placeholder = document.createElement('div');
  placeholder.className = 'thumb-placeholder';
  placeholder.textContent = '読込中...';
  inner.appendChild(placeholder);

  const label = document.createElement('div');
  label.className = 'page-label';
  label.textContent = idx + 1;

  const check = document.createElement('div');
  check.className = 'check-mark';
  check.textContent = '✓';

  div.appendChild(inner);
  div.appendChild(label);
  div.appendChild(check);

  // Click: select / deselect
  div.addEventListener('click', e => {
    if (e.ctrlKey || e.metaKey) {
      toggleSelect(idx);
    } else if (e.shiftKey && selected.size > 0) {
      const last = Math.max(...selected);
      const [lo, hi] = [Math.min(last, idx), Math.max(last, idx)];
      for (let i = lo; i <= hi; i++) selected.add(i);
      updateSelectionUI();
    } else {
      // Single click without modifier: select only this
      selected.clear();
      selected.add(idx);
      updateSelectionUI();
    }
  });

  // Double click: preview
  div.addEventListener('dblclick', e => {
    e.stopPropagation();
    openPreview(idx);
  });

  return div;
}

async function renderThumb(idx) {
  if (idx >= pages.length) return;
  const { fileIdx, origPageIdx, rotation } = pages[idx];
  const doc = pdfjsDocs[fileIdx];
  if (!doc) return;

  const items = thumbnailGridEl.querySelectorAll('.thumbnail-item');
  const item = items[idx];
  if (!item) return;

  const page = await doc.getPage(origPageIdx + 1);
  const viewport = page.getViewport({ scale: 0.28, rotation });

  const canvas = document.createElement('canvas');
  canvas.className = 'thumbnail-canvas';
  canvas.width  = Math.round(viewport.width);
  canvas.height = Math.round(viewport.height);

  await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

  const inner = item.querySelector('.thumb-inner');
  inner.innerHTML = '';
  inner.appendChild(canvas);
}

// ─── Selection ───────────────────────────────────────────────────────────────
function toggleSelect(idx) {
  if (selected.has(idx)) selected.delete(idx); else selected.add(idx);
  updateSelectionUI();
}

function updateSelectionUI() {
  thumbnailGridEl.querySelectorAll('.thumbnail-item').forEach((el, i) => {
    el.classList.toggle('selected', selected.has(i));
  });
  const n = selected.size;
  selectionInfoEl.textContent = n ? `${n}ページ選択中` : '';
}

// ─── Drag & Drop: Reorder Pages ──────────────────────────────────────────────
let dragSrcIdx = null;

thumbnailGridEl.addEventListener('dragstart', e => {
  const item = e.target.closest('.thumbnail-item');
  if (!item) return;
  dragSrcIdx = parseInt(item.dataset.idx);
  setTimeout(() => item.classList.add('dragging'), 0);
});

thumbnailGridEl.addEventListener('dragend', e => {
  const item = e.target.closest('.thumbnail-item');
  if (item) item.classList.remove('dragging');
  thumbnailGridEl.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  dragSrcIdx = null;
});

thumbnailGridEl.addEventListener('dragover', e => {
  e.preventDefault();
  const item = e.target.closest('.thumbnail-item');
  thumbnailGridEl.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  if (item) item.classList.add('drag-over');
});

thumbnailGridEl.addEventListener('drop', e => {
  e.preventDefault();
  const item = e.target.closest('.thumbnail-item');
  if (!item || dragSrcIdx === null) return;
  const destIdx = parseInt(item.dataset.idx);
  if (dragSrcIdx !== destIdx) {
    const [moved] = pages.splice(dragSrcIdx, 1);
    pages.splice(destIdx, 0, moved);
    // Move selection along
    selected.clear();
    renderAllThumbnails();
    showToast('ページを移動しました');
  }
});

// ─── Drop Zone (file drop on page area) ─────────────────────────────────────
pageAreaEl.addEventListener('dragover', e => {
  if (e.dataTransfer.types.includes('Files')) {
    e.preventDefault();
    pageAreaEl.classList.add('drag-over');
  }
});
pageAreaEl.addEventListener('dragleave', e => {
  if (!pageAreaEl.contains(e.relatedTarget)) pageAreaEl.classList.remove('drag-over');
});
pageAreaEl.addEventListener('drop', e => {
  pageAreaEl.classList.remove('drag-over');
  if (e.dataTransfer.files.length) {
    e.preventDefault();
    handleFiles(e.dataTransfer.files);
  }
});

// ─── Delete ──────────────────────────────────────────────────────────────────
function deleteSelected() {
  if (!selected.size) { showToast('削除するページを選択してください'); return; }
  if (!confirm(`選択した ${selected.size} ページを削除しますか？`)) return;
  pages = pages.filter((_, i) => !selected.has(i));
  selected.clear();
  renderAllThumbnails();
  updateFileList();
  showToast('削除しました');
}

// ─── Rotate ──────────────────────────────────────────────────────────────────
function rotatePages(angle) {
  const targets = selected.size ? [...selected] : pages.map((_, i) => i);
  targets.forEach(i => {
    pages[i].rotation = ((pages[i].rotation + angle) % 360 + 360) % 360;
  });
  // Re-render only affected thumbnails
  targets.forEach(i => {
    const items = thumbnailGridEl.querySelectorAll('.thumbnail-item');
    const item = items[i];
    if (item) {
      const inner = item.querySelector('.thumb-inner');
      inner.innerHTML = '<div class="thumb-placeholder">更新中...</div>';
      renderThumb(i).catch(() => {});
    }
  });
  showToast(selected.size ? `${selected.size}ページを回転しました` : `全${targets.length}ページを回転しました`);
}

// ─── Preview Modal ───────────────────────────────────────────────────────────
async function openPreview(idx) {
  previewIdx = idx;
  showModal('previewModal');
  await renderPreviewPage();
}

async function renderPreviewPage() {
  if (previewIdx < 0 || previewIdx >= pages.length) return;
  const { fileIdx, origPageIdx, rotation } = pages[previewIdx];
  const doc = pdfjsDocs[fileIdx];
  if (!doc) return;

  const canvas = document.getElementById('previewCanvas');
  const page   = await doc.getPage(origPageIdx + 1);

  const maxW = window.innerWidth  * 0.85;
  const maxH = window.innerHeight * 0.80;
  const raw = page.getViewport({ scale: 1, rotation });
  const scale = Math.min(maxW / raw.width, maxH / raw.height, 2.0);

  const viewport = page.getViewport({ scale, rotation });
  canvas.width  = Math.round(viewport.width);
  canvas.height = Math.round(viewport.height);
  await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

  document.getElementById('previewLabel').textContent = `${previewIdx + 1} / ${pages.length}`;
}

// ─── PDF Generation ──────────────────────────────────────────────────────────
async function buildPDF(targetPages = pages) {
  const { PDFDocument, degrees } = PDFLib;
  const newDoc = await PDFDocument.create();
  const cache  = {};

  for (const { fileIdx, origPageIdx, rotation } of targetPages) {
    if (!cache[fileIdx]) {
      cache[fileIdx] = await PDFDocument.load(files[fileIdx].buffer);
    }
    const [copied] = await newDoc.copyPages(cache[fileIdx], [origPageIdx]);
    copied.setRotation(degrees(rotation));
    newDoc.addPage(copied);
  }
  return newDoc.save();
}

function triggerDownload(bytes, filename) {
  const blob = new Blob([bytes], { type: 'application/pdf' });
  const url  = URL.createObjectURL(blob);
  const a    = Object.assign(document.createElement('a'), { href: url, download: filename });
  a.click();
  URL.revokeObjectURL(url);
}

// Windowsのネイティブ「名前を付けて保存」ダイアログ（ファイル名・フォルダ選択付き）
async function saveFile(bytes, suggestedName) {
  if ('showSaveFilePicker' in window) {
    try {
      const handle = await window.showSaveFilePicker({
        suggestedName,
        types: [{ description: 'PDF ファイル', accept: { 'application/pdf': ['.pdf'] } }]
      });
      const writable = await handle.createWritable();
      await writable.write(bytes);
      await writable.close();
      return true;
    } catch (e) {
      if (e.name === 'AbortError') return false;
      console.warn('showSaveFilePicker 失敗、フォールバック:', e);
      triggerDownload(bytes, suggestedName);
      return true;
    }
  }
  triggerDownload(bytes, suggestedName);
  return true;
}

// 複数ファイルをフォルダ選択してまとめて保存（分割用）
async function saveFilesToDir(fileList) {
  if ('showDirectoryPicker' in window) {
    try {
      const dir = await window.showDirectoryPicker({ mode: 'readwrite' });
      for (const { bytes, name } of fileList) {
        const fh = await dir.getFileHandle(name, { create: true });
        const w  = await fh.createWritable();
        await w.write(bytes);
        await w.close();
      }
      return true;
    } catch (e) {
      if (e.name === 'AbortError') return false;
      console.warn('showDirectoryPicker 失敗、フォールバック:', e);
      for (const f of fileList) triggerDownload(f.bytes, f.name);
      return true;
    }
  }
  for (const f of fileList) triggerDownload(f.bytes, f.name);
  return true;
}

function formatBytes(n) {
  if (n < 1024) return n + ' B';
  if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
  return (n / 1024 / 1024).toFixed(2) + ' MB';
}

// ─── Download ────────────────────────────────────────────────────────────────
async function downloadPDF() {
  if (!pages.length) { showToast('PDFが読み込まれていません'); return; }
  const btn = document.getElementById('downloadBtn');
  btn.disabled = true; btn.textContent = '生成中...';
  try {
    const bytes = await buildPDF();
    const base  = files.length === 1 ? files[0].name.replace(/\.pdf$/i, '') : 'merged';
    const saved = await saveFile(bytes, `${base}_edited.pdf`);
    if (saved) showToast('保存しました');
  } catch (e) {
    showToast('エラーが発生しました');
    console.error(e);
  } finally {
    btn.disabled = false; btn.textContent = '↓ ダウンロード';
  }
}

// ─── Merge ───────────────────────────────────────────────────────────────────
async function mergePDFs() {
  if (files.length < 2) { showToast('複数のPDFを読み込んでください'); return; }
  const btn = document.getElementById('mergeBtn');
  btn.disabled = true; btn.textContent = '処理中...';
  try {
    const bytes = await buildPDF();
    const saved = await saveFile(bytes, 'merged.pdf');
    if (saved) showToast('保存しました');
  } catch (e) {
    showToast('エラーが発生しました'); console.error(e);
  } finally {
    btn.disabled = false; btn.textContent = '結合';
  }
}

// ─── Split ───────────────────────────────────────────────────────────────────
function parseSplitRanges(input) {
  return input.split(/[,\s]+/)
    .map(s => s.trim())
    .filter(Boolean)
    .map(s => {
      const m = s.match(/^(\d+)-(\d+)$/);
      if (m) return [parseInt(m[1]), parseInt(m[2])];
      const n = parseInt(s);
      if (!isNaN(n)) return [n, n];
      return null;
    })
    .filter(Boolean);
}

function updateSplitPreview() {
  const mode = document.querySelector('input[name="splitMode"]:checked').value;
  const rangeGroup = document.getElementById('rangeGroup');
  const preview    = document.getElementById('splitPreview');

  rangeGroup.style.display = mode === 'range' ? '' : 'none';

  if (mode === 'each') {
    preview.textContent = `${pages.length}個のファイルに分割します（各1ページ）`;
    return;
  }

  const raw = document.getElementById('splitRangeInput').value.trim();
  if (!raw) { preview.textContent = '範囲を入力してください（例: 1-3,4-6）'; return; }

  const ranges = parseSplitRanges(raw);
  if (!ranges.length) { preview.textContent = '形式が正しくありません（例: 1-3,4-6）'; return; }

  const lines = ranges.map((r, i) => {
    const [s, e] = r;
    const valid = s >= 1 && e <= pages.length && s <= e;
    return `ファイル${i + 1}: ${s}〜${e}ページ${valid ? '' : ' ⚠️ 範囲外'}`;
  });
  preview.textContent = lines.join('\n');
}

async function executeSplit() {
  const mode = document.querySelector('input[name="splitMode"]:checked').value;

  const btn = document.getElementById('executeSplitBtn');
  btn.disabled = true; btn.textContent = '処理中...';

  try {
    const fileList = [];

    if (mode === 'each') {
      for (let i = 0; i < pages.length; i++) {
        const bytes = await buildPDF([pages[i]]);
        fileList.push({ bytes, name: `page_${String(i + 1).padStart(3, '0')}.pdf` });
      }
    } else {
      const ranges = parseSplitRanges(document.getElementById('splitRangeInput').value);
      if (!ranges.length) { showToast('範囲を入力してください'); return; }
      for (let ri = 0; ri < ranges.length; ri++) {
        const [s, e] = ranges[ri];
        if (s < 1 || e > pages.length || s > e) {
          showToast(`範囲 ${s}-${e} は無効です`); continue;
        }
        const bytes = await buildPDF(pages.slice(s - 1, e));
        fileList.push({ bytes, name: `split_${ri + 1}_p${s}-${e}.pdf` });
      }
    }

    if (!fileList.length) return;
    const saved = await saveFilesToDir(fileList);
    if (saved) {
      hideModal('splitModal');
      showToast(`${fileList.length}ファイルを保存しました`);
    }
  } finally {
    btn.disabled = false; btn.textContent = '分割してダウンロード';
  }
}

// ─── Compress ────────────────────────────────────────────────────────────────
let compressedBytes = null;

async function executeCompress() {
  if (!pages.length) { showToast('PDFが読み込まれていません'); return; }

  const btn = document.getElementById('executeCompressBtn');
  btn.disabled = true; btn.textContent = '処理中...';
  compressedBytes = null;
  document.getElementById('downloadCompressedBtn').classList.add('hidden');

  try {
    const originalSize = files.reduce((s, f) => s + f.buffer.byteLength, 0);
    compressedBytes = await buildPDF();
    const newSize = compressedBytes.byteLength;
    const ratio   = ((originalSize - newSize) / originalSize * 100).toFixed(1);
    const sign    = newSize < originalSize ? '▼' : '▲';
    document.getElementById('compressResult').textContent =
      `元サイズ: ${formatBytes(originalSize)}\n` +
      `圧縮後:   ${formatBytes(newSize)}\n` +
      `${sign} ${Math.abs(ratio)}% ${newSize < originalSize ? '削減' : '増加（元のPDFが既に最適化済み）'}`;
    document.getElementById('downloadCompressedBtn').classList.remove('hidden');
  } catch (e) {
    document.getElementById('compressResult').textContent = 'エラーが発生しました';
    console.error(e);
  } finally {
    btn.disabled = false; btn.textContent = '圧縮を実行';
  }
}

async function downloadCompressed() {
  if (!compressedBytes) return;
  const base  = files.length === 1 ? files[0].name.replace(/\.pdf$/i, '') : 'compressed';
  const saved = await saveFile(compressedBytes, `${base}_compressed.pdf`);
  if (saved) showToast('保存しました');
}

// ─── Modal Helpers ────────────────────────────────────────────────────────────
function showModal(id) { document.getElementById(id).classList.remove('hidden'); }
function hideModal(id) { document.getElementById(id).classList.add('hidden'); }

// ─── Event Listeners ─────────────────────────────────────────────────────────
document.getElementById('openFileBtn').addEventListener('click', () => fileInputEl.click());
fileInputEl.addEventListener('change', e => { handleFiles(e.target.files); fileInputEl.value = ''; });

document.getElementById('deleteBtn').addEventListener('click', deleteSelected);
document.getElementById('rotateLeftBtn').addEventListener('click', () => rotatePages(-90));
document.getElementById('rotateRightBtn').addEventListener('click', () => rotatePages(90));
document.getElementById('downloadBtn').addEventListener('click', downloadPDF);
document.getElementById('mergeBtn').addEventListener('click', mergePDFs);

document.getElementById('splitBtn').addEventListener('click', () => {
  if (!pages.length) { showToast('PDFが読み込まれていません'); return; }
  showModal('splitModal');
  updateSplitPreview();
});
document.getElementById('compressBtn').addEventListener('click', () => {
  if (!pages.length) { showToast('PDFが読み込まれていません'); return; }
  const originalSize = files.reduce((s, f) => s + f.buffer.byteLength, 0);
  document.getElementById('compressOrigSize').textContent = `現在のサイズ: ${formatBytes(originalSize)}`;
  document.getElementById('compressResult').textContent = '「圧縮を実行」をクリックしてください';
  document.getElementById('downloadCompressedBtn').classList.add('hidden');
  compressedBytes = null;
  showModal('compressModal');
});

// Split modal
document.querySelectorAll('input[name="splitMode"]').forEach(r => r.addEventListener('change', updateSplitPreview));
document.getElementById('splitRangeInput').addEventListener('input', updateSplitPreview);
document.getElementById('executeSplitBtn').addEventListener('click', executeSplit);

// Compress modal
document.getElementById('executeCompressBtn').addEventListener('click', executeCompress);
document.getElementById('downloadCompressedBtn').addEventListener('click', downloadCompressed);

// Preview navigation
document.getElementById('prevPageBtn').addEventListener('click', () => {
  if (previewIdx > 0) { previewIdx--; renderPreviewPage(); }
});
document.getElementById('nextPageBtn').addEventListener('click', () => {
  if (previewIdx < pages.length - 1) { previewIdx++; renderPreviewPage(); }
});

// Close modals (data-close attribute & overlay)
document.querySelectorAll('[data-close]').forEach(btn => {
  btn.addEventListener('click', () => hideModal(btn.dataset.close));
});
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', () => {
    document.querySelectorAll('.modal:not(.hidden)').forEach(m => hideModal(m.id));
  });
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  const inInput = e.target.matches('input, textarea, select');

  if (e.key === 'Escape') {
    document.querySelectorAll('.modal:not(.hidden)').forEach(m => hideModal(m.id));
    return;
  }
  if (inInput) return;

  if (e.key === 'Delete' || e.key === 'Backspace') {
    deleteSelected();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'a') {
    e.preventDefault();
    pages.forEach((_, i) => selected.add(i));
    updateSelectionUI();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'd') {
    e.preventDefault();
    selected.clear();
    updateSelectionUI();
  }
  // Arrow keys in preview
  if (document.getElementById('previewModal').classList.contains('hidden')) return;
  if (e.key === 'ArrowLeft'  && previewIdx > 0) { previewIdx--; renderPreviewPage(); }
  if (e.key === 'ArrowRight' && previewIdx < pages.length - 1) { previewIdx++; renderPreviewPage(); }
});
</script>
