<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Local Editor Tools</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #1a1a2e; color: #e0e0e0;
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 40px 20px;
}

h1 {
  font-size: 28px; font-weight: 700; margin-bottom: 8px;
  letter-spacing: -0.5px;
}
.subtitle {
  font-size: 14px; color: #555; margin-bottom: 56px;
}

.tools {
  display: flex; gap: 24px; flex-wrap: wrap; justify-content: center;
}

.tool-card {
  background: #16213e; border: 1px solid #0f3460; border-radius: 16px;
  padding: 36px 32px; width: 260px; text-decoration: none; color: inherit;
  transition: border-color 0.15s, transform 0.15s;
  display: flex; flex-direction: column; align-items: center; gap: 16px;
}
.tool-card:hover {
  border-color: #1a4a80;
  transform: translateY(-3px);
}

.tool-icon { font-size: 48px; }
.tool-name { font-size: 18px; font-weight: 600; }
.tool-name span { font-weight: 400; color: #888; }
.tool-desc {
  font-size: 12px; color: #555; text-align: center; line-height: 1.7;
}
.tool-badge {
  font-size: 11px; padding: 3px 10px; border-radius: 20px;
  font-weight: 500;
}
.badge-pdf   { background: rgba(233,69,96,0.15);  color: #e94560; }
.badge-image { background: rgba(74,158,255,0.15); color: #4a9eff; }

footer {
  margin-top: 64px; font-size: 11px; color: #333;
}
</style>
</head>
<body>

<h1>Local Editor Tools</h1>
<p class="subtitle">ブラウザで動作・完全オフライン・インストール不要</p>

<div class="tools">

  <a class="tool-card" href="./pdf-editor.html">
    <div class="tool-icon">📄</div>
    <div class="tool-name">PDF<span> Editor</span></div>
    <div class="tool-desc">
      ページ削除・回転・並び替え<br>
      結合・分割・圧縮
    </div>
    <span class="tool-badge badge-pdf">PDF</span>
  </a>

  <a class="tool-card" href="./image-editor.html">
    <div class="tool-icon">🖼️</div>
    <div class="tool-name">Image<span> Editor</span></div>
    <div class="tool-desc">
      回転・並び替え・削除<br>
      JPG保存 / PDFに変換して結合
    </div>
    <span class="tool-badge badge-image">JPG / PNG / WEBP</span>
  </a>

</div>

<footer>Chrome / Edge 最新版対応 &nbsp;·&nbsp; ファイルはブラウザ内のみで処理</footer>

</body>
</html>
